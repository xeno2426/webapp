{% extends "base.html" %}
{% block title %}Reset Password · Xeno{% endblock %}
{% block content %}
<div class="page-body" style="max-width:400px;display:flex;flex-direction:column;justify-content:center;min-height:100%;">

<h1>Reset password</h1>
<p>Use your recovery phrase + admin key.</p>

{% if error %}<div class="error">{{ error }}</div>{% endif %}
{% if info_msg %}<div class="info">{{ info_msg }}</div>{% endif %}

<form method="post">
  <input name="username" placeholder="Username" required autocorrect="off" autocapitalize="off">
  <input name="recovery" placeholder="Your recovery phrase" required>
  <input name="password" type="password" placeholder="New password" required>
  <input name="password2" type="password" placeholder="Confirm new password" required>
  <input name="admin_key" placeholder="Admin key" required>
  <button class="btn" type="submit">Change password</button>
</form>

<form action="/login" style="margin-top:8px;">
  <button class="btn2" type="submit">Back to login</button>
</form>

</div>
{% endblock %}
