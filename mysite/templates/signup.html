{% extends "base.html" %}
{% block title %}Sign Up · Xeno{% endblock %}
{% block content %}
<div class="page-body" style="max-width:400px;display:flex;flex-direction:column;justify-content:center;min-height:100%;">

<h1>Create account</h1>
<p>Make a new Xeno account.</p>

{% if error %}<div class="error">{{ error }}</div>{% endif %}

<form method="post">
  <input name="username" placeholder="Username" required autocomplete="username"
         autocorrect="off" autocapitalize="off">
  <input name="password" type="password" placeholder="Password" required>
  <input name="password2" type="password" placeholder="Confirm password" required>
  <input name="recovery" placeholder="Recovery phrase (optional)">
  <button class="btn" type="submit">Create account</button>
</form>

<form action="/login" style="margin-top:8px;">
  <button class="btn2" type="submit">Back to login</button>
</form>

</div>
{% endblock %}
