{% extends "base.html" %}
{% block title %}Sign Up · Xeno WebApp{% endblock %}
{% block content %}
<h1>Create account</h1>
<p>Make a new Xeno account.</p>
{% if error %}<div class="error">{{ error }}</div>{% endif %}
<form method="post">
  <input name="username" placeholder="Username" required autocomplete="username">
  <input name="password" type="password" placeholder="Password" required>
  <input name="password2" type="password" placeholder="Confirm password" required>
  <input name="recovery" placeholder="Recovery phrase (optional)">
  <button class="btn" type="submit">Create account</button>
</form>
<form action="/login">
  <button class="btn2" type="submit">Back to login</button>
</form>
{% endblock %}
