{% extends "base.html" %}
{% block title %}Edit Note · Xeno{% endblock %}
{% block content %}
<div class="page-body">

<h1>Edit note</h1>

{% if error %}<div class="error">{{ error }}</div>{% endif %}

<form method="post">
  <input name="title" value="{{ note.title }}">
  <textarea name="body">{{ note.body }}</textarea>
  <button class="btn" type="submit">Save changes</button>
</form>

<p style="margin-top:12px;"><a href="/" class="link">← Back to Home</a></p>

</div>
{% endblock %}
